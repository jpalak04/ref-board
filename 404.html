<head><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>@font-face{font-family:"Syne_400Regular";src:local("Syne");font-weight:400}@font-face{font-family:"Syne_500Medium";src:local("Syne");font-weight:500}@font-face{font-family:"Syne_600SemiBold";src:local("Syne");font-weight:600}@font-face{font-family:"Syne_700Bold";src:local("Syne");font-weight:700}@font-face{font-family:"Syne_800ExtraBold";src:local("Syne");font-weight:800}@font-face{font-family:"Manrope_200ExtraLight";src:local("Manrope");font-weight:200}@font-face{font-family:"Manrope_300Light";src:local("Manrope");font-weight:300}@font-face{font-family:"Manrope_400Regular";src:local("Manrope");font-weight:400}@font-face{font-family:"Manrope_500Medium";src:local("Manrope");font-weight:500}@font-face{font-family:"Manrope_600SemiBold";src:local("Manrope");font-weight:600}@font-face{font-family:"Manrope_700Bold";src:local("Manrope");font-weight:700}@font-face{font-family:"Manrope_800ExtraBold";src:local("Manrope");font-weight:800}</style>
  <meta charset="utf-8">
  <title>RefBoard</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // Converts path to query string so index.html can handle it
    var pathSegmentsToKeep = 1; // Keep /ref-board
    var l = window.location;
    var repo = '/ref-board';
    
    // Get the path after /ref-board
    var path = l.pathname.slice(repo.length);
    
    // Redirect to index with path as query param
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      repo + '/?p=' + encodeURIComponent(path + l.search).replace(/%2F/g, '/') +
      (l.hash ? l.hash : '')
    );
  </script>
</head>
